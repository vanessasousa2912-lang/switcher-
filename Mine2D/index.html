<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft 2D Infinito - Luis Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: none; }
        .slot { 
            width: 50px; height: 50px; background: rgba(0,0,0,0.6); 
            border: 3px solid #333; display: flex; align-items: center; 
            justify-content: center; color: white; font-size: 10px;
            pointer-events: auto; cursor: pointer; border-radius: 4px;
            overflow: hidden;
        }
        .slot.active { border-color: #fff; background: rgba(0,0,0,0.8); transform: scale(1.1); }
        #info {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5);
            color: white; padding: 10px; border-radius: 5px; pointer-events: none; font-size: 11px;
            z-index: 10;
        }
        #error-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,0,0,0.8); color: white; padding: 20px; border-radius: 10px;
            display: none; text-align: center; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="error-msg">
        <b>Erro: Imagem não encontrada!</b><br>
        Certifique-se que o arquivo <b>SpriteSheetBlocks.png</b><br>
        está dentro da pasta <b>Mine2D</b> no GitHub.
    </div>

    <div id="info">
        <b>X:</b> <span id="valX">0</span> | <b>Y:</b> <span id="valY">0</span><br>
        <b>Zoom:</b> <span id="valZoom">100</span>%<br>
        <i>Status: Carregando texturas...</i>
    </div>

    <div id="ui"></div>

    <canvas id="gameCanvas"></canvas>

<script>
/**
 * MINECRAFT 2D INFINITO - VERSÃO CORRIGIDA (PATH FIX)
 * Luis, este código assume que a imagem está na mesma pasta que este HTML.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hotbarUI = document.getElementById('ui');
const errorDisplay = document.getElementById('error-msg');

// Removido o cache bust complexo para garantir compatibilidade com GitHub Pages
const spriteSheet = new Image();
spriteSheet.src = 'SpriteSheetBlocks.png'; 

let TILE_SIZE_BASE = 24; 
let zoomLevel = 1.0;
const CHUNK_SIZE = 16; 
const WORLD_HEIGHT = 120;
const WATER_LEVEL = 65; 

const BLOCKS = { 
    AIR: 0, GRASS: 1, DIRT: 2, SAND: 3, STONE: 4,
    COAL: 5, IRON: 6, DIAMOND: 7, WATER: 8,
    SNOW: 9, DEEPSLATE: 10, COAL_DEEP: 11, IRON_DEEP: 12,
    DIAMOND_DEEP: 13, WOOD: 14, LEAVES: 15, BEDROCK: 16
};

const BLOCK_DATA = {
    [BLOCKS.AIR]: { name: 'Ar', transparent: true },
    [BLOCKS.GRASS]: { sx: 0, sy: 0, name: 'Grama' },
    [BLOCKS.DIRT]: { sx: 1, sy: 0, name: 'Terra' },
    [BLOCKS.SAND]: { sx: 2, sy: 0, name: 'Areia', physics: 'falling' },
    [BLOCKS.STONE]: { sx: 3, sy: 0, name: 'Pedra' },
    [BLOCKS.COAL]: { sx: 0, sy: 1, name: 'Carvão' },
    [BLOCKS.IRON]: { sx: 1, sy: 1, name: 'Ferro' },
    [BLOCKS.DIAMOND]: { sx: 2, sy: 1, name: 'Diamante' },
    [BLOCKS.WATER]: { sx: 3, sy: 1, name: 'Água', alpha: 0.7 },
    [BLOCKS.SNOW]: { sx: 0, sy: 2, name: 'Neve' },
    [BLOCKS.DEEPSLATE]: { sx: 1, sy: 2, name: 'Ardósia' },
    [BLOCKS.COAL_DEEP]: { sx: 2, sy: 2, name: 'Carvão Ardósia' },
    [BLOCKS.IRON_DEEP]: { sx: 3, sy: 2, name: 'Ferro Ardósia' },
    [BLOCKS.DIAMOND_DEEP]: { sx: 0, sy: 3, name: 'Diamante Ardósia' },
    [BLOCKS.WOOD]: { sx: 1, sy: 3, name: 'Tronco' }, 
    [BLOCKS.LEAVES]: { sx: 2, sy: 3, name: 'Folhas' }, 
    [BLOCKS.BEDROCK]: { sx: 3, sy: 3, name: 'Bedrock', unbreakable: true }
};

let chunks = new Map();
let camera = { x: 0, y: 0 };
let selectedSlot = 0;
let inventory = [BLOCKS.GRASS, BLOCKS.STONE, BLOCKS.WOOD, BLOCKS.LEAVES, BLOCKS.SAND, BLOCKS.WATER, BLOCKS.IRON, BLOCKS.DIAMOND];

let isDragging = false, dragX = 0, dragY = 0, camSX = 0, camSY = 0, moved = 0;
let initialPinchDist = null;

function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    camera.y = (WORLD_HEIGHT * TILE_SIZE_BASE) * 0.5 - canvas.height / 2;
    
    spriteSheet.onload = () => {
        errorDisplay.style.display = 'none';
        setupUI();
        requestAnimationFrame(gameLoop);
    };
    
    spriteSheet.onerror = () => {
        errorDisplay.style.display = 'block';
        console.error("404: SpriteSheetBlocks.png não encontrado no caminho: " + spriteSheet.src);
    };

    if(spriteSheet.complete && spriteSheet.naturalWidth !== 0) {
        setupUI();
        requestAnimationFrame(gameLoop);
    }
}

function getTerrainHeight(x) {
    let noise = Math.sin(x * 0.05) * 8 + Math.sin(x * 0.02) * 12;
    return Math.floor(WORLD_HEIGHT * 0.55 + noise);
}

function generateChunk(chunkIdx) {
    let chunk = [];
    for (let x = 0; x < CHUNK_SIZE; x++) {
        chunk[x] = new Array(WORLD_HEIGHT).fill(BLOCKS.AIR);
        let worldX = chunkIdx * CHUNK_SIZE + x;
        let groundLevel = getTerrainHeight(worldX);
        let biomeVal = Math.sin(worldX * 0.01); 
        let isSnow = biomeVal < -0.4;
        let isDesert = biomeVal > 0.4 || groundLevel >= WATER_LEVEL;

        for (let y = 0; y < WORLD_HEIGHT; y++) {
            if (y >= WORLD_HEIGHT - 2) { chunk[x][y] = BLOCKS.BEDROCK; continue; }
            if (y >= WATER_LEVEL && y < groundLevel) { chunk[x][y] = BLOCKS.WATER; continue; }

            if (y >= groundLevel) {
                if (y === groundLevel) {
                    chunk[x][y] = isSnow ? BLOCKS.SNOW : (isDesert ? BLOCKS.SAND : BLOCKS.GRASS);
                } else if (y < groundLevel + 4) {
                    chunk[x][y] = (isDesert || groundLevel >= WATER_LEVEL) ? BLOCKS.SAND : BLOCKS.DIRT;
                } else {
                    let isDeep = y > 88;
                    let blockType = isDeep ? BLOCKS.DEEPSLATE : BLOCKS.STONE;
                    let rand = Math.random();
                    if (isDeep) {
                        if (rand < 0.015) chunk[x][y] = BLOCKS.DIAMOND_DEEP;
                        else if (rand < 0.04) chunk[x][y] = BLOCKS.IRON_DEEP;
                        else if (rand < 0.07) chunk[x][y] = BLOCKS.COAL_DEEP;
                        else chunk[x][y] = blockType;
                    } else {
                        if (rand < 0.01) chunk[x][y] = BLOCKS.DIAMOND;
                        else if (rand < 0.04) chunk[x][y] = BLOCKS.IRON;
                        else if (rand < 0.07) chunk[x][y] = BLOCKS.COAL;
                        else chunk[x][y] = blockType;
                    }
                }
            }
        }
    }
    
    let lastTreeX = -10;
    for (let x = 0; x < CHUNK_SIZE; x++) {
        let worldX = chunkIdx * CHUNK_SIZE + x;
        let groundLevel = getTerrainHeight(worldX);
        let biomeVal = Math.sin(worldX * 0.01);
        
        if (Math.random() < 0.15 && biomeVal >= -0.4 && biomeVal <= 0.4 && groundLevel < WATER_LEVEL && (x - lastTreeX) > 4) {
            lastTreeX = x;
            let treeH = 3 + Math.floor(Math.random() * 3);
            for(let th = 1; th <= treeH; th++) {
                if (groundLevel - th >= 0) chunk[x][groundLevel - th] = BLOCKS.WOOD;
            }
            for(let ly = -2; ly <= 0; ly++) {
                for(let lx = -2; lx <= 2; lx++) {
                    let tx = x + lx;
                    let ty = groundLevel - treeH + ly - 1;
                    if (ty >= 0 && tx >= 0 && tx < CHUNK_SIZE) {
                        if (chunk[tx][ty] === BLOCKS.AIR) chunk[tx][ty] = BLOCKS.LEAVES;
                    }
                }
            }
        }
    }
    chunks.set(chunkIdx, chunk);
}

function draw() {
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const curSize = TILE_SIZE_BASE * zoomLevel;
    const startChunk = Math.floor(camera.x / (CHUNK_SIZE * curSize));
    const endChunk = Math.ceil((camera.x + canvas.width) / (CHUNK_SIZE * curSize));

    document.getElementById('valX').innerText = Math.floor(camera.x / curSize);
    document.getElementById('valY').innerText = Math.floor(camera.y / curSize);
    document.getElementById('valZoom').innerText = Math.round(zoomLevel * 100);

    for (let c = startChunk; c <= endChunk; c++) {
        if (!chunks.has(c)) generateChunk(c);
        let chunk = chunks.get(c);
        let chunkOffsetX = c * CHUNK_SIZE * curSize;

        for (let x = 0; x < CHUNK_SIZE; x++) {
            for (let y = 0; y < WORLD_HEIGHT; y++) {
                let b = chunk[x][y];
                if (b === BLOCKS.AIR) continue;

                let data = BLOCK_DATA[b];
                let screenX = chunkOffsetX + (x * curSize) - camera.x;
                let screenY = (y * curSize) - camera.y;
                
                if (screenX > -curSize && screenX < canvas.width && screenY > -curSize && screenY < canvas.height) {
                    if (data.sx !== undefined) {
                        ctx.globalAlpha = data.alpha || 1.0;
                        ctx.drawImage(
                            spriteSheet, 
                            data.sx * 16, data.sy * 16, 16, 16, 
                            screenX, screenY, curSize + 0.5, curSize + 0.5
                        );
                        ctx.globalAlpha = 1.0;
                    }
                }
            }
        }
    }
}

function updatePhysics() {
    const curSize = TILE_SIZE_BASE * zoomLevel;
    const startChunk = Math.floor(camera.x / (CHUNK_SIZE * curSize));
    const endChunk = Math.ceil((camera.x + canvas.width) / (CHUNK_SIZE * curSize));

    for (let c = startChunk; c <= endChunk; c++) {
        let chunk = chunks.get(c);
        if (!chunk) continue;
        for (let x = 0; x < CHUNK_SIZE; x++) {
            for (let y = WORLD_HEIGHT - 5; y >= 0; y--) {
                let block = chunk[x][y];
                if (BLOCK_DATA[block].physics === 'falling') {
                    if (chunk[x][y+1] === BLOCKS.AIR || chunk[x][y+1] === BLOCKS.WATER) {
                        let target = chunk[x][y+1];
                        chunk[x][y+1] = block;
                        chunk[x][y] = (target === BLOCKS.WATER) ? BLOCKS.WATER : BLOCKS.AIR;
                    }
                }
            }
        }
    }
}

function setupUI() {
    hotbarUI.innerHTML = '';
    inventory.forEach((item, index) => {
        const slot = document.createElement('div');
        slot.className = `slot ${index === selectedSlot ? 'active' : ''}`;
        const data = BLOCK_DATA[item];
        const preview = document.createElement('canvas');
        preview.width = 32; preview.height = 32;
        const pCtx = preview.getContext('2d');
        pCtx.imageSmoothingEnabled = false;
        
        const drawPreview = () => pCtx.drawImage(spriteSheet, data.sx*16, data.sy*16, 16, 16, 0, 0, 32, 32);
        if(spriteSheet.complete) drawPreview();
        else spriteSheet.onload = drawPreview;

        slot.appendChild(preview);
        slot.onclick = (e) => { e.stopPropagation(); selectedSlot = index; setupUI(); };
        hotbarUI.appendChild(slot);
    });
}

function handleAction(clientX, clientY, isRight) {
    const curSize = TILE_SIZE_BASE * zoomLevel;
    let worldX = Math.floor((clientX + camera.x) / curSize);
    let worldY = Math.floor((clientY + camera.y) / curSize);
    let chunkIdx = Math.floor(worldX / CHUNK_SIZE);
    let localX = worldX % CHUNK_SIZE;
    if (localX < 0) localX += CHUNK_SIZE; 
    let chunk = chunks.get(chunkIdx);
    if (chunk && worldY >= 0 && worldY < WORLD_HEIGHT) {
        if (isRight) {
            if (chunk[localX][worldY] === BLOCKS.AIR || chunk[localX][worldY] === BLOCKS.WATER)
                chunk[localX][worldY] = inventory[selectedSlot];
        } else {
            if (!BLOCK_DATA[chunk[localX][worldY]].unbreakable) chunk[localX][worldY] = BLOCKS.AIR;
        }
    }
}

window.addEventListener('wheel', (e) => {
    if (e.deltaY < 0) zoomLevel = Math.min(zoomLevel + 0.1, 3.0);
    else zoomLevel = Math.max(zoomLevel - 0.1, 0.3);
}, { passive: false });

canvas.addEventListener('mousedown', (e) => { isDragging = true; moved = 0; dragX = e.clientX; dragY = e.clientY; camSX = camera.x; camSY = camera.y; });
window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    camera.x = camSX + (dragX - e.clientX);
    camera.y = camSY + (dragY - e.clientY);
    moved += 5;
});
window.addEventListener('mouseup', (e) => {
    isDragging = false;
    if (moved < 15) handleAction(e.clientX, e.clientY, e.button === 2);
});

canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
        initialPinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
    } else {
        let t = e.touches[0]; isDragging = true; moved = 0; dragX = t.clientX; dragY = t.clientY; camSX = camera.x; camSY = camera.y;
    }
});
window.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && initialPinchDist) {
        let dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        zoomLevel = Math.min(Math.max(zoomLevel * (dist / initialPinchDist), 0.3), 3.0);
        initialPinchDist = dist;
    } else if (isDragging) {
        let t = e.touches[0];
        camera.x = camSX + (dragX - t.clientX);
        camera.y = camSY + (dragY - t.clientY);
        moved = 20;
    }
});
window.addEventListener('touchend', () => { isDragging = false; initialPinchDist = null; });

function gameLoop() {
    updatePhysics();
    draw();
    requestAnimationFrame(gameLoop);
}

window.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('keydown', e => { if (e.key >= '1' && e.key <= '8') { selectedSlot = e.key - 1; setupUI(); } });
init();
</script>
</body>
</html>
